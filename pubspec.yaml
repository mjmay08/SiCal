name: sical
description: "SiCal is a calendar app for iOS and Android powered by the Sia Network"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  sical_rust:
    path: rust_builder
  uuid: ^4.5.3
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
