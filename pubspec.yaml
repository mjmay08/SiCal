name: sical
description: "SiCal is a calendar app for iOS and Android powered by the Sia Network"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sia_storage: ^0.2.0
  uuid: ^4.5.3
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.2
  flutter_custom_tabs: ^2.4.0
  table_calendar: ^3.2.0
  file_selector: ^1.1.0
  icalendar_parser: ^2.1.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  flutter_foreground_task: ^9.0.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  image: "assets/icon_splash.png"
  color: "#001F3F"
  android_12:
    image: "assets/icon_splash.png"
    color: "#001F3F"
